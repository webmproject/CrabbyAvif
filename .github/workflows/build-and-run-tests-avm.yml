name: Build and Run Tests (avm Feature)
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

# Cancel the workflow if a new one is triggered from the same PR, branch, or tag, except on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-run-tests-avm-feature:
    name: "Build and Run Tests on ${{ matrix.os }} (avm Features)"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Build aom.
      - uses: ./.github/actions/setup-deps

      # Build avm.
      - name: Cache external avm dependency
        id: cache-ext-avm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: sys/avm-sys
          key: ${{ runner.os }}-${{ hashFiles('.github/workflows/build-and-run-tests-avm.yml', 'sys/avm-sys/build.rs', 'sys/avm-sys/Cargo.toml', 'sys/avm-sys/avm.cmd', 'sys/avm-sys/wrapper.h') }}
      - uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        if: steps.cache-ext-avm.outputs.cache-hit != 'true'
      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
        if: steps.cache-ext-avm.outputs.cache-hit != 'true'
      - uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67 # v6
        if: steps.cache-ext-avm.outputs.cache-hit != 'true'
      - name: Download and build avm
        if: steps.cache-ext-avm.outputs.cache-hit != 'true'
        working-directory: ./sys/avm-sys
        run: ./avm.cmd

      - name: Build and run the Rust tests
        run: cargo test --features aom,avm
